name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format, vet, build, codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::unformatted files; run 'gofmt -w .'"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: |
          go build ./...
          go -C tools build ./...

      - name: Vet
        run: |
          go vet ./...
          go vet -tags integration ./...
          go -C tools vet ./...

      - name: Generated code is up to date
        run: |
          go generate ./...
          if ! git diff --exit-code; then
            echo "::error::generated code is stale; run 'go generate ./...' and commit the result"
            exit 1
          fi

      - name: Modules are tidy
        run: |
          go mod tidy
          go -C tools mod tidy
          if ! git diff --exit-code; then
            echo "::error::modules are untidy; run 'go mod tidy' and 'go -C tools mod tidy'"
            exit 1
          fi
