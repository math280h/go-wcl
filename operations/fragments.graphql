fragment Faction on GameFaction {
  id
  name
}

fragment RegionSummary on Region {
  id
  name
  slug
  compactName
}

fragment Server on Server {
  id
  name
  normalizedName
  slug
  blizzardID
  connectedRealmID
  # @genqlient(flatten: true)
  region {
    ...RegionSummary
  }
}

fragment Character on Character {
  id
  canonicalID
  name
  classID
  level
  hidden
  guildRank
  # @genqlient(flatten: true)
  faction {
    ...Faction
  }
  # @genqlient(flatten: true)
  server {
    ...Server
  }
}

fragment Guild on Guild {
  id
  name
  description
  competitionMode
  stealthMode
  type
  # @genqlient(flatten: true)
  faction {
    ...Faction
  }
  # @genqlient(flatten: true)
  server {
    ...Server
  }
}

fragment ZoneSummary on Zone {
  id
  name
}

fragment ExpansionSummary on Expansion {
  id
  name
}

fragment Zone on Zone {
  id
  name
  frozen
  # @genqlient(flatten: true)
  expansion {
    ...ExpansionSummary
  }
  difficulties {
    id
    name
    sizes
  }
  encounters {
    id
    name
  }
  partitions {
    id
    name
    compactName
    default
  }
  brackets {
    min
    max
    bucket
    type
  }
}

fragment Encounter on Encounter {
  id
  name
  journalID
  # @genqlient(flatten: true)
  zone {
    ...ZoneSummary
  }
}

fragment Expansion on Expansion {
  id
  name
  zones {
    id
    name
  }
}

fragment Region on Region {
  id
  name
  slug
  compactName
  subregions {
    id
    name
  }
}

fragment User on User {
  id
  name
}

fragment CurrentUser on User {
  id
  name
  avatar
  battleTag
}

fragment GameZoneSummary on GameZone {
  id
  name
}

fragment GuildSummary on Guild {
  id
  name
}

# The fields a listing needs. Spread this rather than Report where the selection
# is repeated per row.
fragment ReportSummary on Report {
  code
  title
  startTime
  endTime
  # @genqlient(flatten: true)
  zone {
    ...ZoneSummary
  }
  # @genqlient(flatten: true)
  guild {
    ...GuildSummary
  }
  # @genqlient(flatten: true)
  owner {
    ...User
  }
}

fragment Report on Report {
  ...ReportSummary
  visibility
  revision
  segments
  exportedSegments
  region {
    id
    name
  }
  archiveStatus {
    isArchived
    isAccessible
    archiveDate
  }
}

fragment PhaseTransition on PhaseTransition {
  id
  startTime
}

fragment PhaseMetadata on PhaseMetadata {
  id
  name
  # @genqlient(pointer: true)
  isIntermission
}

fragment EncounterPhases on EncounterPhases {
  encounterID
  # @genqlient(pointer: true)
  separatesWipes
  # @genqlient(flatten: true)
  phases {
    ...PhaseMetadata
  }
}

# Nullable fields are generated as pointers so callers can tell absent from the
# zero value: on a trash fight kill, difficulty and size are all null.
fragment ReportFight on ReportFight {
  id
  name
  encounterID
  # @genqlient(pointer: true)
  originalEncounterID
  # @genqlient(pointer: true)
  difficulty
  # @genqlient(pointer: true)
  size
  # @genqlient(pointer: true)
  kill
  # @genqlient(pointer: true)
  inProgress
  completeRaid
  startTime
  endTime
  # @genqlient(pointer: true)
  fightPercentage
  # @genqlient(pointer: true)
  bossPercentage
  # @genqlient(pointer: true)
  averageItemLevel
  friendlyPlayers
  enemyPlayers
  # @genqlient(pointer: true)
  keystoneLevel
  # @genqlient(pointer: true)
  keystoneTime
  # @genqlient(pointer: true)
  keystoneBonus
  keystoneAffixes
  # @genqlient(pointer: true)
  hardModeLevel
  # @genqlient(pointer: true)
  lastPhase
  # @genqlient(pointer: true)
  lastPhaseAsAbsoluteIndex
  # @genqlient(pointer: true)
  lastPhaseIsIntermission
  # @genqlient(flatten: true)
  phaseTransitions {
    ...PhaseTransition
  }
  # @genqlient(flatten: true)
  gameZone {
    ...GameZoneSummary
  }
}

# Aliased because the schema spells these snake_case, which would otherwise
# generate Go fields like Per_page.
fragment ReportPage on ReportPagination {
  total
  perPage: per_page
  currentPage: current_page
  lastPage: last_page
  hasMorePages: has_more_pages
  from
  to
  # @genqlient(flatten: true)
  data {
    ...ReportSummary
  }
}

fragment ReportActor on ReportActor {
  gameID
  id
  name
  type
  subType
  icon
  petOwner
  server
}

fragment ReportAbility on ReportAbility {
  gameID
  icon
  name
  type
}

fragment ReportMasterData on ReportMasterData {
  logVersion
  gameVersion
  lang
  # @genqlient(flatten: true)
  abilities {
    ...ReportAbility
  }
  # @genqlient(flatten: true)
  actors {
    ...ReportActor
  }
}

fragment RateLimit on RateLimitData {
  limitPerHour
  pointsSpentThisHour
  pointsResetIn
}
