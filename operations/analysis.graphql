) {
  reportData {
    # @genqlient(pointer: true)
    report(code: $code) {
      events(
        dataType: $dataType
        startTime: $startTime
        endTime: $endTime
        fightIDs: $fightIDs
        encounterID: $encounterID
        difficulty: $difficulty
        killType: $killType
