# @genqlient(omitempty: true)
query getCharacterZoneRankings(
  $id: Int
  $name: String
  $serverSlug: String
  $serverRegion: String
  $zoneID: Int
  $metric: CharacterPageRankingMetricType
  $difficulty: Int
  $partition: Int
  $role: RoleType
  $size: Int
  $className: String
  $specName: String
  $byBracket: Boolean
  $timeframe: RankingTimeframeType
  $compare: RankingCompareType
  $includePrivateLogs: Boolean
) {
  characterData {
    # @genqlient(pointer: true)
    character(id: $id, name: $name, serverSlug: $serverSlug, serverRegion: $serverRegion) {
      zoneRankings(
        zoneID: $zoneID
        metric: $metric
        difficulty: $difficulty
        partition: $partition
        role: $role
        size: $size
        className: $className
        specName: $specName
        byBracket: $byBracket
        timeframe: $timeframe
        compare: $compare
        includePrivateLogs: $includePrivateLogs
      )
    }
  }
}

